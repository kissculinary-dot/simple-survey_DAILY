<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meal Program Feedback</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap');

/* BODY */

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:linear-gradient(135deg,#f4f6fb,#e9eef6);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

/* MAIN CARD */

.container{
background:white;
border-radius:18px;
padding:28px;
max-width:420px;
width:100%;
box-shadow:0 15px 40px rgba(0,0,0,0.12);
text-align:center;
}

/* HEADER */

h1{
font-size:20px;
font-weight:700;
line-height:1.4;
margin-bottom:12px;
color:#222;
}

.mealLine{
font-size:15px;
font-weight:600;
color:#2563eb;
margin-bottom:6px;
white-space:nowrap;
}

.subtitle{
font-size:14px;
font-style:italic;
color:#6b7280;
margin-bottom:24px;
}

/* FORM */

label{
display:block;
font-weight:600;
font-size:14px;
margin-bottom:6px;
text-align:left;
}

select, textarea{
width:100%;
padding:14px;
font-size:15px;
border-radius:10px;
border:1px solid #d1d5db;
margin-bottom:18px;
font-family:'Montserrat',sans-serif;
box-sizing:border-box;
background:#fafafa;
}

select:focus, textarea:focus{
outline:none;
border-color:#3b82f6;
background:white;
}

textarea{
height:110px;
resize:none;
}

/* BUTTON */

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:all .2s;
}

button:active{
transform:scale(.97);
}

/* POPUP */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.8);
background:white;
padding:26px 34px;
border-radius:14px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
font-size:18px;
font-weight:600;
opacity:0;
pointer-events:none;
text-align:center;
}

.show{
animation:popup .4s forwards;
}

@keyframes popup{
0%{transform:translate(-50%,-50%) scale(.8);opacity:0}
60%{transform:translate(-50%,-50%) scale(1.05);opacity:1}
100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}

/* HEARTS */

.heart{
position:fixed;
font-size:20px;
animation:floatHeart 2.2s ease-out forwards;
pointer-events:none;
}

@keyframes floatHeart{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-160px) scale(1.6);
opacity:0;
}
}

</style>

</head>

<body>

<div class="container">

<h1>
How satisfied were you with the company meal programs today?
</h1>

<div class="mealLine">
Breakfast • Korean/American Lunch • Dinner
</div>

<div class="subtitle">
Please specify the meal type
</div>

<label>Meal Type</label>

<select id="mealType">
<option value="">Select Meal</option>
<option value="Breakfast">Breakfast</option>
<option value="Korean Lunch">Korean Lunch</option>
<option value="American Lunch">American Lunch</option>
<option value="Dinner">Dinner</option>
</select>

<label>Comments</label>

<textarea id="comment" placeholder="Share your feedback..."></textarea>

<button onclick="submitFeedback()">Submit Feedback</button>

</div>

<div id="popup">Thank you for your feedback!</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/library/d/1VRtnyYYGzKhFdcz3YBz1cCprhvEPlmGcn_8pW5l9pGAXt5O2MbTHlMRf/2";

/* HEARTS */

function showHearts(){

for(let i=0;i<20;i++){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.top=Math.random()*window.innerHeight+"px";
heart.style.fontSize=(18+Math.random()*18)+"px";
heart.style.animationDuration=(1.5+Math.random()*1.5)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),2500);

}

}

/* POPUP */

function showPopup(){

const popup=document.getElementById("popup");

popup.classList.add("show");

setTimeout(()=>{
popup.classList.remove("show");
},1800);

}

/* SUBMIT */

function submitFeedback(){

const meal=document.getElementById("mealType").value;
const comment=document.getElementById("comment").value;

if(!meal){
alert("Please select a meal type.");
return;
}

fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
menu:meal,
comment:comment,
timestamp:new Date().toISOString()
})
});

showHearts();
showPopup();

document.getElementById("comment").value="";
document.getElementById("mealType").value="";

}

</script>

</body>
</html>
