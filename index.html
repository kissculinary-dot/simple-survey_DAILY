```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meal Program Feedback</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:linear-gradient(180deg,#f7f9fc,#eef2f7);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:16px;
-webkit-font-smoothing:antialiased;
}

/* MAIN CARD */

.container{
background:white;
border-radius:20px;
padding:26px;
max-width:460px;
width:100%;
box-shadow:0 18px 45px rgba(0,0,0,0.12);
text-align:center;
}

/* HEADER */

h1{
font-size:20px;
font-weight:700;
line-height:1.35;
margin-bottom:6px;
color:#1f2937;
}

/* MEAL LINE */

.meal-line{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:nowrap;
font-size:14px;
font-weight:600;
color:#2563eb;
margin-bottom:16px;
white-space:nowrap;
}

.subtitle{
font-size:14px;
font-style:italic;
color:#6b7280;
margin-bottom:22px;
}

/* FORM */

label{
display:block;
font-weight:600;
font-size:14px;
margin-bottom:6px;
text-align:left;
color:#374151;
}

select, textarea{
width:100%;
padding:14px;
font-size:16px;
border-radius:12px;
border:1px solid #d1d5db;
margin-bottom:18px;
font-family:'Montserrat',sans-serif;
box-sizing:border-box;
background:#fafafa;
-webkit-appearance:none;
}

select:focus, textarea:focus{
outline:none;
border-color:#3b82f6;
background:white;
}

textarea{
height:110px;
resize:none;
}

/* BUTTON */

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:all .2s;
}

button:active{
transform:scale(.97);
}

/* POPUP */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.85);
background:white;
padding:26px 34px;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
font-size:18px;
font-weight:600;
opacity:0;
pointer-events:none;
text-align:center;
}

.show{
animation:popup .4s forwards;
}

@keyframes popup{
0%{transform:translate(-50%,-50%) scale(.85);opacity:0}
60%{transform:translate(-50%,-50%) scale(1.05);opacity:1}
100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}

/* HEARTS */

.heart{
position:fixed;
font-size:20px;
animation:floatHeart 2.2s ease-out forwards;
pointer-events:none;
}

@keyframes floatHeart{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-160px) scale(1.6);
opacity:0;
}
}

/* MOBILE IMPROVEMENTS */

@media (max-width:420px){

.container{
padding:22px;
}

h1{
font-size:18px;
}

.meal-line{
font-size:13px;
gap:10px;
}

button{
font-size:15px;
padding:15px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>
How satisfied were you with the company meal programs today
</h1>

<div class="meal-line">
<span>Breakfast</span>
<span>•</span>
<span>Korean/American Lunch</span>
<span>•</span>
<span>Dinner</span>
</div>

<div class="subtitle">
Please specify the meal type
</div>

<label>Meal Type</label>

<select id="mealType">
<option value="">Select Meal</option>
<option value="Breakfast">Breakfast</option>
<option value="Korean Lunch">Korean Lunch</option>
<option value="American Lunch">American Lunch</option>
<option value="Dinner">Dinner</option>
</select>

<label>Comments</label>

<textarea id="comment" placeholder="Share your feedback..."></textarea>

<button onclick="submitFeedback()">Submit Feedback</button>

</div>

<div id="popup">Thank you for your feedback!</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbztv9Z_PAwtOFhxsiF2vlexbcbqD2yE54ddvDyFT94hI6jd9uq8LtWn3KTtsQbJk0Gy/exec";

/* HEARTS */

function showHearts(){

for(let i=0;i<20;i++){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.top=Math.random()*window.innerHeight+"px";
heart.style.fontSize=(18+Math.random()*18)+"px";
heart.style.animationDuration=(1.5+Math.random()*1.5)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),2500);

}

}

/* POPUP */

function showPopup(){

const popup=document.getElementById("popup");

popup.classList.add("show");

setTimeout(()=>{
popup.classList.remove("show");
},1800);

}

/* SUBMIT */

function submitFeedback(){

const meal=document.getElementById("mealType").value;
const comment=document.getElementById("comment").value;

if(!meal){
alert("Please select a meal type.");
return;
}

fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
menu:meal,
comment:comment,
timestamp:new Date().toISOString()
})
});

showHearts();
showPopup();

document.getElementById("comment").value="";
document.getElementById("mealType").value="";

}

</script>

</body>
</html>
```
