<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Feedback</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f4f7fb;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
height:100vh;
text-align:center;
}

/* Header */
.header{
margin-top:80px;
}

.header h1{
font-size:54px;
color:#222;
margin:0;
}

/* Menu Sections */
.menuContainer{
margin-top:80px;
display:flex;
gap:200px;
}

.menuCard{
display:flex;
flex-direction:column;
align-items:center;
}

/* Menu Titles */
.menuTitle{
font-size:36px;
font-weight:700;
margin-bottom:50px;
}

.korean{
color:#c62828;
}

.american{
color:#1e3a8a;
}

/* Feedback Buttons */
.buttonRow{
display:flex;
gap:40px;
}

.feedbackBtn{
width:180px;
height:180px;
border-radius:50%;
border:none;
font-size:48px;
cursor:pointer;
background:white;
box-shadow:0 18px 45px rgba(0,0,0,0.15);
transition:all .25s ease;
display:flex;
align-items:center;
justify-content:center;
}

.feedbackBtn:hover{
transform:scale(1.1);
}

.feedbackBtn:active{
transform:scale(.95);
}

.love{
color:#e53935;
}

.dislike{
color:#555;
}

/* Popup */
#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.8);
background:white;
padding:40px 70px;
border-radius:14px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
font-size:28px;
font-weight:600;
opacity:0;
pointer-events:none;
}

.show{
animation:popup .45s forwards;
}

@keyframes popup{
0%{transform:translate(-50%,-50%) scale(.8);opacity:0}
50%{transform:translate(-50%,-50%) scale(1.05);opacity:1}
100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}
</style>
</head>

<body>

<div class="header">
<h1>How was your meal today?</h1>
</div>

<div class="menuContainer">

<!-- Korean Menu -->
<div class="menuCard">
<div class="menuTitle korean">Korean Menu</div>

<div class="buttonRow">
<button class="feedbackBtn love" data-menu="Korean Menu" data-response="Loved it">❤️</button>
<button class="feedbackBtn dislike" data-menu="Korean Menu" data-response="Needs Improvement">👎</button>
</div>
</div>

<!-- American Menu -->
<div class="menuCard">
<div class="menuTitle american">American Menu</div>

<div class="buttonRow">
<button class="feedbackBtn love" data-menu="American Menu" data-response="Loved it">❤️</button>
<button class="feedbackBtn dislike" data-menu="American Menu" data-response="Needs Improvement">👎</button>
</div>
</div>

</div>

<div id="popup">Thank you for your feedback!</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyLCSIUkSFwn2DaryNYcE3rGE6-QcbXnSV0zsuf7mgE5FMluvSZXXsgUKMU2G2pRv1T/exec";

const buttons=document.querySelectorAll(".feedbackBtn");

buttons.forEach(btn=>{
btn.addEventListener("click",()=>{

const menu=btn.dataset.menu;
const response=btn.dataset.response;

fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
menu:menu,
response:response,
timestamp:new Date().toISOString()
})
});

const popup=document.getElementById("popup");
popup.classList.add("show");

setTimeout(()=>{
popup.classList.remove("show");
},1800);

});
});

</script>

</body>
</html>
